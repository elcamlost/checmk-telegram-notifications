name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        uses: pre-commit/action@v3.0.1

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest -v
