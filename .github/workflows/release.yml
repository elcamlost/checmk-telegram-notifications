name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.base_ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Build MKP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^PLUGIN_VERSION=.*/PLUGIN_VERSION=\"$VERSION\"/" package.sh
          bash package.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: telegram_notify.mkp
          generate_release_notes: true
